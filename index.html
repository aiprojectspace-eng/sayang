<<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sayang 💕</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sayang 💕" />
  <meta name="theme-color" content="#ff6b9d" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:      #ff6b9d;
      --rose:      #ff4d7e;
      --blush:     #ffd6e7;
      --cream:     #fff5f8;
      --deep:      #3d1a2e;
      --gold:      #f7c59f;
    }

    html, body {
      height: 100%;
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 20%, #ffd6e7 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 80%, #ffe4ec 0%, transparent 55%),
                  radial-gradient(ellipse at 50% 50%, #fff0f5 0%, #fce4ec 100%);
    }

    .petals {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
    }
    .petal {
      position: absolute; top: -40px;
      font-size: 1.2rem;
      opacity: 0;
      animation: fallDown linear infinite;
    }
    @keyframes fallDown {
      0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(360deg) scale(1.1); opacity: 0; }
    }

    /* ── MAIN LAYOUT ── */
    .app {
      position: relative; z-index: 2;
      height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      padding: 2rem 1.5rem;
    }

    /* ── TITLE ── */
    .title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--rose);
      letter-spacing: 0.02em;
      text-align: center;
      margin-bottom: 0.3rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }
    .subtitle {
      font-size: 0.78rem;
      color: #c0748e;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.5s;
    }

    /* ── HEART BUTTON ── */
    .heart-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.7s;
    }

    .heart-btn {
      position: relative;
      background: none; border: none; cursor: pointer;
      padding: 0; line-height: 1;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s ease;
    }
    .heart-btn:active { transform: scale(0.93); }

    .heart-svg {
      width: clamp(140px, 38vw, 190px);
      height: clamp(140px, 38vw, 190px);
      filter: drop-shadow(0 8px 24px rgba(255,77,126,0.35));
      transition: filter 0.3s ease;
    }
    .heart-btn:hover .heart-svg {
      filter: drop-shadow(0 12px 32px rgba(255,77,126,0.5));
    }

    .heart-path {
      fill: url(#heartGrad);
      transition: fill 0.3s ease;
    }

    /* Pulse ring */
    .pulse-ring {
      position: absolute; inset: -20px;
      border-radius: 50%;
      border: 2px solid rgba(255,107,157,0.4);
      animation: pulseRing 2.5s ease-out infinite;
      pointer-events: none;
    }
    .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
    .pulse-ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes pulseRing {
      0%   { transform: scale(0.85); opacity: 0.6; }
      100% { transform: scale(1.5);  opacity: 0; }
    }

    /* ── MESSAGE CARD ── */
    .msg-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,182,212,0.5);
      border-radius: 20px;
      padding: 1.1rem 1.5rem;
      max-width: 320px; width: 100%;
      text-align: center;
      min-height: 72px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(255,107,157,0.12);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.9s;
    }
    .msg-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.88rem, 3.2vw, 1rem);
      color: var(--deep);
      line-height: 1.65;
      transition: opacity 0.4s ease;
    }
    .msg-text.fade { opacity: 0; }

    /* ── STATUS ── */
    .status {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c0748e;
      text-align: center;
      min-height: 1.2em;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.1s;
      transition: color 0.3s ease;
    }
    .status.success { color: #e05c8a; }
    .status.error   { color: #e07777; }

    /* ── BURST HEARTS (on click) ── */
    .burst {
      position: fixed; pointer-events: none; z-index: 99;
    }
    .burst-heart {
      position: absolute;
      font-size: 1.4rem;
      animation: burstFly 0.9s ease-out forwards;
      transform-origin: center;
    }
    @keyframes burstFly {
      0%   { transform: translate(0,0) scale(0.5) rotate(0deg); opacity: 1; }
      80%  { opacity: 0.8; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
    }

    /* ── MISC ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Beat animation on send */
    @keyframes bigBeat {
      0%   { transform: scale(1); }
      20%  { transform: scale(1.18); }
      40%  { transform: scale(0.95); }
      60%  { transform: scale(1.1); }
      80%  { transform: scale(0.98); }
      100% { transform: scale(1); }
    }
    .beating { animation: bigBeat 0.6s ease; }
  </style>
</head>
<body>

<div class="bg"></div>

<!-- Floating petals -->
<div class="petals" id="petals"></div>

<div class="app">
  <div class="title">just thinking of you</div>
  <div class="subtitle">press to send your love</div>

  <div class="heart-wrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <button class="heart-btn" id="heartBtn" aria-label="Hantar cinta">
      <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#ff8fb3"/>
            <stop offset="50%"  stop-color="#ff4d7e"/>
            <stop offset="100%" stop-color="#e8305a"/>
          </linearGradient>
          <linearGradient id="heartGradActive" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#ff6ba8"/>
            <stop offset="50%"  stop-color="#e8305a"/>
            <stop offset="100%" stop-color="#c0003a"/>
          </linearGradient>
          <!-- Shine overlay -->
          <radialGradient id="shine" cx="35%" cy="30%" r="40%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.45)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
        </defs>
        <path class="heart-path" d="M50 85 C50 85 5 55 5 28 C5 14 16 5 28 5 C36 5 44 10 50 18 C56 10 64 5 72 5 C84 5 95 14 95 28 C95 55 50 85 50 85Z"/>
        <path d="M50 85 C50 85 5 55 5 28 C5 14 16 5 28 5 C36 5 44 10 50 18 C56 10 64 5 72 5 C84 5 95 14 95 28 C95 55 50 85 50 85Z" fill="url(#shine)"/>
        <!-- Small inner highlight -->
        <ellipse cx="35" cy="28" rx="10" ry="7" fill="rgba(255,255,255,0.2)" transform="rotate(-20,35,28)"/>
      </svg>
    </button>
  </div>

  <div class="msg-card">
    <div class="msg-text" id="msgText">✨ Press the heart to send your love...</div>
  </div>

  <div class="status" id="statusText"></div>
</div>

<script>
  // ── CONFIG ──
  const TOPIC = 'sayangjaisma2026';
  const NTFY  = 'https://ntfy.sh';

  // ── 20 ROMANTIC MESSAGES ──
  const messages = [
    "Every heartbeat of mine belongs to you. 💗",
    "You are my favourite place to come back to. 🏡❤️",
    "Thank you for being the light of my life. 🌟",
    "I love you more than words could ever say. 💕",
    "Your smile is the best thing that happened to me. 😊💖",
    "Wherever you are, my heart is always with you. 🌸",
    "You make this whole world feel so much better. 🌺",
    "I'm grateful every single day just because of you. 🤍",
    "Sending you a big virtual hug right now. 🤗💞",
    "You're my favourite chapter in this story called life. 📖💓",
    "My love for you will never fade, not even a little. 🌹",
    "You're always on my mind, always in my heart. 💭💗",
    "Every day means more to me because you're in it. ☀️",
    "You are the answer to every prayer I've ever had. 🤲💕",
    "Your eyes are the brightest stars I've ever seen. ⭐",
    "Being with you is the safest place in the world. 🕊️",
    "I fall in love with you a little more each day. 🥰",
    "You are the greatest miracle in my life. ✨💖",
    "Missing you always, even when we're just apart for a moment. 🌙",
    "You fill my heart with so much happiness, it overflows. 💝",
  ];

  let lastIdx = -1;
  function getRandom() {
    let idx;
    do { idx = Math.floor(Math.random() * messages.length); } while (idx === lastIdx);
    lastIdx = idx;
    return messages[idx];
  }

  // ── PETALS ──
  const petalsEl = document.getElementById('petals');
  const PETAL_CHARS = ['🌸','💮','🌺','🌷','✿','❀'];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = PETAL_CHARS[Math.floor(Math.random() * PETAL_CHARS.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 10) + 's';
    p.style.animationDelay    = (Math.random() * 12) + 's';
    p.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
    petalsEl.appendChild(p);
  }

  // ── BURST EFFECT ──
  function spawnBurst(x, y) {
    const container = document.createElement('div');
    container.className = 'burst';
    document.body.appendChild(container);
    const count = 10;
    for (let i = 0; i < count; i++) {
      const h = document.createElement('span');
      h.className = 'burst-heart';
      h.textContent = ['💕','💗','💓','💖','❤️','🩷'][Math.floor(Math.random()*6)];
      const angle  = (360 / count) * i + (Math.random() * 30 - 15);
      const dist   = 60 + Math.random() * 60;
      const rad    = angle * Math.PI / 180;
      h.style.setProperty('--tx', Math.cos(rad) * dist + 'px');
      h.style.setProperty('--ty', Math.sin(rad) * dist + 'px');
      h.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
      h.style.left = x + 'px'; h.style.top = y + 'px';
      h.style.animationDelay = (Math.random() * 0.15) + 's';
      container.appendChild(h);
    }
    setTimeout(() => container.remove(), 1200);
  }

  // ── MAIN SEND ──
  const btn      = document.getElementById('heartBtn');
  const msgText  = document.getElementById('msgText');
  const statusEl = document.getElementById('statusText');
  let sending = false;

  async function sendLove(e) {
    if (sending) return;
    sending = true;

    // Position for burst
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    spawnBurst(cx, cy);

    // Beat animation
    const svg = btn.querySelector('.heart-svg');
    svg.classList.remove('beating');
    void svg.offsetWidth;
    svg.classList.add('beating');
    svg.addEventListener('animationend', () => svg.classList.remove('beating'), { once: true });

    // Pick message
    const chosen = getRandom();

    // Fade out → swap → fade in
    msgText.classList.add('fade');
    await sleep(400);
    msgText.textContent = chosen;
    msgText.classList.remove('fade');

    // Status
    setStatus('Sending love...', '');

    try {
      await fetch(`${NTFY}/${TOPIC}`, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Title':    '💕 Someone is thinking of you!',
          'Priority': 'default',
          'Tags':     'heart,sparkling_heart',
        },
        body: chosen,
      });
      // no-cors returns opaque response — assume success if no throw
      setStatus('Love sent! 💌', 'success');
    } catch {
      setStatus('No internet. Try again? 🥺', 'error');
    }

    setTimeout(() => setStatus('', ''), 3500);
    setTimeout(() => { sending = false; }, 1500);
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + cls;
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  btn.addEventListener('click', sendLove);
  btn.addEventListener('touchend', e => { e.preventDefault(); sendLove(e); });
</script>
</body>
</html>
