<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0b0b0b;
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(255,71,87,0.07) 0%, transparent 70%);
            pointer-events: none;
            animation: ambientPulse 3s ease-in-out infinite;
        }

        @keyframes ambientPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.4s, transform 0.4s;
        }
        .screen.hidden {
            opacity: 0; pointer-events: none; transform: scale(0.96);
        }

        /* WHO SCREEN */
        .who-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #555; font-size: 15px;
            letter-spacing: 0.1em; margin-bottom: 40px;
        }

        .who-buttons { display: flex; gap: 20px; }

        .who-btn {
            width: 130px; height: 130px; border-radius: 50%;
            border: 1.5px solid rgba(255,71,87,0.2);
            background: rgba(255,71,87,0.05);
            color: #fff; cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            -webkit-tap-highlight-color: transparent;
        }
        .who-btn:active { transform: scale(0.92); background: rgba(255,71,87,0.15); }
        .who-btn .who-emoji { font-size: 36px; }
        .who-btn .who-name {
            font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 13px;
            color: #666; letter-spacing: 0.05em;
        }

        /* MAIN SCREEN */
        .greeting {
            font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 13px;
            color: #3a3a3a; letter-spacing: 0.08em; margin-bottom: 48px;
        }

        .heart-wrap {
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .ring {
            position: absolute; border-radius: 50%;
            border: 1.5px solid rgba(255,71,87,0.3);
            animation: ringPulse 2.4s ease-out infinite;
            pointer-events: none;
        }
        .ring:nth-child(1) { width: 220px; height: 220px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 270px; height: 270px; animation-delay: 0.6s; }
        .ring:nth-child(3) { width: 320px; height: 320px; animation-delay: 1.2s; }

        @keyframes ringPulse {
            0%   { opacity: 0.7; transform: scale(0.92); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        .heart-btn {
            position: relative; z-index: 2;
            width: 180px; height: 180px;
            background: radial-gradient(circle at 35% 35%, #ff6b7a, #ff1a33);
            border-radius: 50%; border: none;
            font-size: 80px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow:
                0 0 40px rgba(255,71,87,0.35),
                0 0 80px rgba(255,71,87,0.15),
                inset 0 2px 8px rgba(255,255,255,0.15);
            transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            animation: heartbeat 2.4s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14%  { transform: scale(1.08); }
            28%  { transform: scale(1); }
            42%  { transform: scale(1.05); }
            56%  { transform: scale(1); }
        }

        .heart-btn:active  { transform: scale(0.88) !important; animation: none; box-shadow: 0 0 15px rgba(255,71,87,0.2); }
        .heart-btn.sending { animation: none; transform: scale(0.92); opacity: 0.7; pointer-events: none; }
        .heart-btn.sent    { animation: sentBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

        @keyframes sentBounce {
            0%  { transform: scale(0.88); }
            60% { transform: scale(1.15); }
            100%{ transform: scale(1); }
        }

        .status {
            margin-top: 40px; font-size: 12px; color: #3a3a3a;
            letter-spacing: 0.12em; text-transform: uppercase;
            height: 20px; transition: color 0.3s; font-weight: 300;
        }
        .status.active { color: #ff6b7a; }

        .switch-user {
            position: fixed; bottom: 32px;
            font-size: 11px; color: #2a2a2a;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; border: none; background: none;
            font-family: 'Lato', sans-serif;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .switch-user:active { color: #ff6b7a; }

        /* TOAST */
        .message-toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(20,20,20,0.92);
            border: 1px solid rgba(255,71,87,0.25);
            color: #fff; padding: 14px 28px; border-radius: 40px;
            font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 16px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 100; white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        .message-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #particles { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

    <!-- Screen 1: Who are you? -->
    <div class="screen" id="whoScreen">
        <div class="who-title">who's missing who?</div>
        <div class="who-buttons">
            <button class="who-btn" onclick="selectUser('husband')">
                <span class="who-emoji">🧔</span>
                <span class="who-name">Suami</span>
            </button>
            <button class="who-btn" onclick="selectUser('wife')">
                <span class="who-emoji">👩</span>
                <span class="who-name">Isteri</span>
            </button>
        </div>
    </div>

    <!-- Screen 2: Heart button -->
    <div class="screen hidden" id="mainScreen">
        <div class="greeting" id="greeting"></div>
        <div class="heart-wrap">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <button class="heart-btn" id="heartBtn" onclick="sendSignal()">❤️</button>
        </div>
        <div class="status" id="status">—</div>
        <button class="switch-user" onclick="switchUser()">bukan saya</button>
    </div>

    <div class="message-toast" id="toast"></div>
    <canvas id="particles"></canvas>

    <script>
        // ── TUKAR INI ──────────────────────────────────────────
        const TOPICS = {
            husband: 'sayangyayam123zxc098mnb',    // suami tekan → bini terima notif
            wife:    'sayanghubby123zxc098mnb'     // isteri tekan → suami terima notif
        };
        // ──────────────────────────────────────────────────────

        const MESSAGES = [
            "I miss you ❤️",
            "Thinking of you 💭",
            "Wishing you were here 🌙",
            "Just wanted you to know 💌",
            "You crossed my mind ✨",
            "Missing your smile 🌸",
            "Can't stop thinking about you 💕",
            "Sending you love 🩷"
        ];

        let currentUser = localStorage.getItem('missUser') || null;
        if (currentUser) showMain();

        function selectUser(who) {
            currentUser = who;
            localStorage.setItem('missUser', who);
            showMain();
        }

        function showMain() {
            document.getElementById('whoScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('greeting').innerText = 'tap to let Sayang know';
        }

        function switchUser() {
            localStorage.removeItem('missUser');
            currentUser = null;
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('whoScreen').classList.remove('hidden');
        }

        // ── AUDIO ──
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playHeartbeat() {
            if (!audioCtx) audioCtx = new AudioCtx();
            playThump(audioCtx.currentTime, 0.6);
            playThump(audioCtx.currentTime + 0.22, 0.35);
        }

        function playThump(t, gain) {
            const osc = audioCtx.createOscillator();
            const g   = audioCtx.createGain();
            const f   = audioCtx.createBiquadFilter();
            f.type = 'lowpass';
            f.frequency.setValueAtTime(120, t);
            f.frequency.exponentialRampToValueAtTime(40, t + 0.18);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(80, t);
            osc.frequency.exponentialRampToValueAtTime(30, t + 0.18);
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(gain, t + 0.015);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
            osc.connect(f); f.connect(g); g.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.2);
        }

        // ── PARTICLES ──
        const canvas = document.getElementById('particles');
        const ctx    = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let particles = [], animFrame = null;

        function spawnParticles(x, y) {
            for (let i = 0; i < 28; i++) {
                const angle = (Math.PI * 2 / 28) * i + (Math.random() - 0.5) * 0.5;
                const speed = 2.5 + Math.random() * 5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1.5,
                    alpha: 1, size: 10 + Math.random() * 18,
                    decay: 0.012 + Math.random() * 0.01,
                    emoji: Math.random() < 0.7 ? '❤️' : (Math.random() < 0.5 ? '💕' : '🩷')
                });
            }
            animateParticles();
        }

        function animateParticles() {
            if (animFrame) cancelAnimationFrame(animFrame);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0.01);
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.font = `${p.size}px serif`;
                ctx.textAlign = 'center';
                ctx.fillText(p.emoji, p.x, p.y);
                ctx.restore();
                p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= p.decay;
            }
            if (particles.length > 0) animFrame = requestAnimationFrame(animateParticles);
            else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ── TOAST ──
        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ── SEND ──
        function sendSignal() {
            if (!currentUser) return;
            const btn    = document.getElementById('heartBtn');
            const status = document.getElementById('status');
            const topic  = TOPICS[currentUser];
            const msg    = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];

            playHeartbeat();
            const rect = btn.getBoundingClientRect();
            spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);

            btn.classList.add('sending');
            status.innerText = 'Sending...';
            status.classList.add('active');

            fetch(`https://ntfy.sh/${topic}`, {
                method: 'POST', body: msg,
                headers: { 'Title': '💌 Missing You', 'Priority': '3', 'Tags': 'heartpulse', 'TTL': '5' }
            })
            .then(() => {
                btn.classList.remove('sending');
                btn.classList.add('sent');
                setTimeout(() => btn.classList.remove('sent'), 600);
                status.innerText = 'Sent ❤️';
                showToast(msg);
                setTimeout(() => { status.innerText = '—'; status.classList.remove('active'); }, 2500);
                if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
            })
            .catch(() => {
                btn.classList.remove('sending');
                status.innerText = 'Error — try again';
                setTimeout(() => { status.innerText = '—'; status.classList.remove('active'); }, 2000);
            });
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
